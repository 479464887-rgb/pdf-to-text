<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="PDF to Text - PDF文本提取工具"><meta property="og:title" content="PDF to Text"><title>PDF to Text</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:1000px;margin:0 auto;padding:24px}.upload-zone{background:#161b22;border:2px dashed #30363d;border-radius:12px;padding:40px;text-align:center;cursor:pointer;margin-bottom:20px}.upload-zone:hover{border-color:#58a6ff}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin:4px}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.result-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}.result-header{background:#21262d;padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}.result-body{max-height:500px;overflow-y:auto;padding:16px;background:#0d1117;font-family:monospace;font-size:13px;line-height:1.6;white-space:pre-wrap}.page-indicator{font-size:12px;color:#8b949e}.loading{padding:24px;text-align:center;color:#8b949e}.error{color:#f85149;padding:16px}.info-bar{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#8b949e;margin-bottom:12px}</style></head><body><header><h1>📄 PDF to Text</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFile(event)"><div class="upload-zone" onclick="document.getElementById("fileInput").click()"><div style="font-size:48px;margin-bottom:12px">📄</div><div>点击上传PDF文件</div><div style="font-size:12px;color:#484f58;margin-top:8px">支持文本型PDF文件</div></div><div id="output"></div></div><script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script><script>var lang="zh";function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";function handleFile(e){var file=e.target.files[0];if(!file||file.type!=="application/pdf"){document.getElementById("output").innerHTML="<div class="error">请选择PDF文件</div>";return}document.getElementById("output").innerHTML="<div class="loading">⏳ 正在提取文本...</div>";var reader=new FileReader();reader.onload=function(ev){var typedarray=new Uint8Array(ev.target.result);pdfjsLib.getDocument({data:typedarray}).promise.then(function(pdf){var total=pdf.numPages;var promises=[];for(var i=1;i<=total;i++)promises.push(pdf.getPage(i).then(function(page){return page.getTextContent().then(function(content){var text=content.items.map(function(item){return item.str}).join(" ");return{num:page.pageNumber,text:text}})}));Promise.all(promises).then(function(pages){var fullText=pages.map(function(p){return p.text}).join("\n\n");document.getElementById("output").innerHTML="<div class="info-bar"><span>总页数: "+total+"</span><span>总字符: "+fullText.length+"</span></div><div class="result-panel"><div class="result-header"><span>提取的文本</span><button class="btn" onclick="copyText()">📋 复制全部</button><button class="btn" onclick="downloadText()">⬇️ 下载TXT</button></div><div class="result-body" id="textContent">"+escHtml(fullText)+"</div></div>";window._extractedText=fullText}).catch(function(e){document.getElementById("output").innerHTML="<div class="error">文本提取失败: "+e.message+"</div>"})}).catch(function(e){document.getElementById("output").innerHTML="<div class="error">PDF加载失败: "+e.message+"<br>提示: 某些加密或扫描型PDF无法提取文本</div>"})};reader.readAsArrayBuffer(file)}function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}function copyText(){if(window._extractedText)navigator.clipboard.writeText(window._extractedText)}function downloadText(){if(window._extractedText){var blob=new Blob([window._extractedText],{type:"text/plain"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="extracted.txt";a.click()}}</script></body></html>
